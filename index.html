<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Master Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a1a; color: white;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .bg-symbol {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 50vw; color: rgba(255, 255, 255, 0.03);
            z-index: -1; pointer-events: none;
        }

        .container { text-align: center; z-index: 10; width: 100%; max-width: 600px; padding: 10px; }

        .page {
            display: none; flex-direction: column; align-items: center;
            gap: 15px; animation: fadeIn 0.4s ease-in-out;
        }

        .active { display: flex; }

        button {
            padding: 12px 30px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; border: none; border-radius: 8px;
            background-color: #4CAF50; color: white; transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn-secondary { background-color: #3498db; }
        .btn-white { background-color: #ecf0f1; color: #2c3e50; }
        .btn-black { background-color: #2c3e50; color: #ecf0f1; border: 1px solid #7f8c8d; }
        #chess-board {
            display: grid;
            grid-template-columns: repeat(8, min(11vw, 60px));
            grid-template-rows: repeat(8, min(11vw, 60px));
            border: 4px solid #333;
            margin: 10px auto;
            user-select: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .square {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            font-size: min(8vw, 40px); 
            cursor: pointer;
            position: relative;
        }

        .light { background-color: #eeeed2; }
        .dark { background-color: #7d945d; }
        .selected { background-color: #f6f669 !important; }

        .move-hint::after {
            content: ''; width: 25%; height: 25%;
            background: rgba(0, 0, 0, 0.15); border-radius: 50%;
            position: absolute; z-index: 2;
        }

        #win-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100; justify-content: center; align-items: center;
            flex-direction: column; animation: zoomIn 0.5s ease-out;
            padding: 20px;
        }

        #win-text { 
            font-size: clamp(2rem, 10vw, 4rem); 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            text-align: center;
            text-shadow: 0 0 20px rgba(255,255,255,0.3); 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        h1 { font-size: 3rem; margin: 0; }
        h2 { font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="win-overlay">
        <div id="win-text">White Wins!</div>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <div class="bg-symbol">♞</div>

    <div class="container">
        <div id="page1" class="page active">
            <h1>CHESS</h1>
            <button onclick="nextPage('page2')">Enter the Game</button>
        </div>

        <div id="page2" class="page">
            <h2>Select Game Mode</h2>
            <button class="btn-secondary" onclick="setMode('Friend')">Play with Friend</button>
            <button class="btn-secondary" onclick="setMode('Computer')">Play with Computer</button>
        </div>

        <div id="page3" class="page">
            <h2>Choose Your Side</h2>
            <div style="display: flex; gap: 15px;">
                <button class="btn-white" onclick="startGame('w')">White</button>
                <button class="btn-black" onclick="startGame('b')">Black</button>
            </div>
        </div>

        <div id="page4" class="page">
            <h2 id="game-status" style="margin: 5px 0;">Enjoy the Game</h2>
            <div id="chess-board"></div>
            <button onclick="location.reload()" style="background: #e74c3c; padding: 10px 20px; font-size: 1rem;">Quit Game</button>
        </div>
    </div>

    <script>
        let game = new Chess();
        let selectedSquare = null;
        let gameSettings = { mode: '', playerColor: 'w' };

        const pieceUnicode = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'
        };

        function speak(text) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.rate = 1.0;
                window.speechSynthesis.speak(msg);
            }
        }

        function nextPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function setMode(mode) {
            gameSettings.mode = mode;
            nextPage('page3');
        }

        function startGame(color) {
            gameSettings.playerColor = color;
            createBoard();
            nextPage('page4');
            updateStatus();
            if(gameSettings.mode === 'Computer' && color === 'b') {
                setTimeout(makeComputerMove, 800);
            }
        }

        function createBoard() {
            const boardElement = document.getElementById('chess-board');
            boardElement.innerHTML = '';
            const boardLayout = game.board();

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    const squareName = String.fromCharCode(97 + col) + (8 - row);
                    const piece = boardLayout[row][col];
                    
                    square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                    square.dataset.square = squareName;
                    
                    if (piece) {
                        square.innerText = pieceUnicode[piece.type === 'p' ? (piece.color === 'w' ? 'P' : 'p') : (piece.color === 'w' ? piece.type.toUpperCase() : piece.type)];
                        square.style.color = piece.color === 'w' ? "#333" : "black";
                    }
                    square.onclick = () => handleSquareClick(squareName);
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(square) {
            if (game.game_over()) return;
            if (gameSettings.mode === 'Computer' && game.turn() !== gameSettings.playerColor) return;

            const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });

            if (move === null) {
                const piece = game.get(square);
                if (piece && piece.color === game.turn()) {
                    selectedSquare = square;
                    createBoard();
                    highlightPaths(square);
                    document.querySelector(`[data-square="${square}"]`).classList.add('selected');
                } else {
                    selectedSquare = null;
                    createBoard();
                }
            } else {
                selectedSquare = null;
                createBoard();
                updateStatus();
                if (gameSettings.mode === 'Computer' && !game.game_over()) {
                    setTimeout(makeComputerMove, 800);
                }
            }
        }

        function highlightPaths(sourceSquare) {
            const moves = game.moves({ square: sourceSquare, verbose: true });
            moves.forEach(m => {
                const targetSquare = document.querySelector(`[data-square="${m.to}"]`);
                if (targetSquare) targetSquare.classList.add('move-hint');
            });
        }

        function makeComputerMove() {
            const moves = game.moves();
            if (moves.length === 0) return;
            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            game.move(randomMove);
            createBoard();
            updateStatus();
        }

        function updateStatus() {
            const statusEl = document.getElementById('game-status');
            const overlay = document.getElementById('win-overlay');
            const winText = document.getElementById('win-text');
            
            if (game.in_checkmate()) {
                const winner = game.turn() === 'w' ? 'Black' : 'White';
                statusEl.innerText = "Checkmate!";
                winText.innerText = `${winner} Wins the Game!`;
                winText.style.color = winner === 'White' ? '#fff' : '#4CAF50';
                overlay.style.display = 'flex';
                speak(`${winner} gives checkmate and wins the game!`);
            } else if (game.in_draw()) {
                statusEl.innerText = "Draw!";
                speak("The game is a draw.");
            } else {
                const turnColor = game.turn() === 'w' ? "White" : "Black";
                statusEl.innerText = `${turnColor}'s Move`;
                if (game.in_check()) {
                    const attacker = game.turn() === 'w' ? "Black" : "White";
                    statusEl.innerText += " (Check!)";
                    speak(`${turnColor} king was checked by ${attacker}`);
                }
            }
        }
    </script>
</body>
</html>
